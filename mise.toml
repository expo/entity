[tools]
node = "24.12.0"
yarn = "4.12.0"

[tasks.yarn]
run = "yarn install --immutable"

[tasks.build]
depends = "yarn"
run = "yarn build"

[tasks.typedoc]
depends = "build"
run = "yarn typedoc"

[tasks."checks:lint"]
depends = "yarn"
run = "yarn lint --max-warnings=0"

[tasks."checks:barrel"]
description = "Check if barrel files are up-to-date"
depends = "yarn"
run = [
  "yarn ctix",
  '[ -z "$(git status --porcelain)" ]',
]

[tasks."checks:unit"]
depends = "yarn"
run = "yarn test --coverage"

[tasks."checks:integration"]
depends = "yarn"
run = "yarn integration --coverage"

[tasks.ci]
run = { task = "checks:*" }
